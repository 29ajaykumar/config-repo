spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/orders/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8185
management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*"

  zipkin:
    base-url: http://localhost:9411
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
